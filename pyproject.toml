[tool.mypy]
python_version = "3.11"
check_untyped_defs = true
warn_unused_configs = true
disallow_untyped_defs = false
enable_error_code = ["ignore-without-code"]

[[tool.mypy.overrides]]
module = "ioe_types"
disallow_untyped_defs = true
warn_return_any = true

[[tool.mypy.overrides]]
module = "ioe_crypto"
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "telethon.*", "imapclient", "Crypto.*", "PIL.*",
    "readability", "trafilatura", "truststore", "bs4",
    "ddgs", "duckduckgo_search", "playwright.*", "bcrypt",
    "requests.*",
]
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "B", "SIM", "UP", "PT"]
ignore = ["E402", "E501", "PT009", "PT011", "PT013", "PT015", "PT017", "SIM105", "SIM108", "SIM115", "F841"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=server --cov=client --cov=webui --cov=ioe_types --cov=ioe_crypto --cov=ioe_telemetry --cov-report=term-missing --cov-fail-under=90"
