[tool.mypy]
python_version = "3.11"
check_untyped_defs = true
warn_unused_configs = true
disallow_untyped_defs = false
enable_error_code = ["ignore-without-code"]

[[tool.mypy.overrides]]
module = "ioe_types"
disallow_untyped_defs = true
warn_return_any = true

[[tool.mypy.overrides]]
module = "ioe_crypto"
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "telethon.*", "imapclient", "Crypto.*", "PIL.*",
    "readability", "trafilatura", "truststore", "bs4",
    "ddgs", "duckduckgo_search", "playwright.*", "bcrypt",
    "requests.*",
]
ignore_missing_imports = true
