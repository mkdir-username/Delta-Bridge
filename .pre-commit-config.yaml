repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: make typecheck
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: python -m pytest --no-header -q
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
