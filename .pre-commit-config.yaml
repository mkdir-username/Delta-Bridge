repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: make typecheck
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: python -m pytest tests/test_auth.py tests/test_hardening.py tests/test_ioe_crypto.py tests/test_types.py tests/test_error_types.py tests/test_envelope.py -x -q --timeout=10
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
