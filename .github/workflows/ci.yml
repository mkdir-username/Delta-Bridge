name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install ruff mypy pytest pytest-cov
          pip install pycryptodome imapclient requests beautifulsoup4 readability-lxml trafilatura Pillow duckduckgo_search bcrypt
      - name: Check
        run: make check
